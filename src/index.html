<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muebles para regalar</title>
</head>
<body>
  <header>
    <h1>Muebles para regalar</h1>
  </header>

  <main>
    <section>
      <h2>Mesa 1</h2>
      <div class="specs">
        <svg class="diagram" viewBox="0 0 280 200" role="img"
             aria-label="Mesa 1: 160 cm de largo, 80 cm de fondo y 72 cm de alto">
          <!-- Cota de largo -->
          <line x1="40" y1="50" x2="220" y2="50"/>
          <line x1="40" y1="44" x2="40" y2="56"/>
          <line x1="220" y1="44" x2="220" y2="56"/>
          <text x="130" y="42" text-anchor="middle">Largo · 160 cm</text>
          <!-- Mesa -->
          <rect class="furniture" x="40" y="70" width="180" height="12"/>
          <rect class="furniture" x="48" y="82" width="10" height="90"/>
          <rect class="furniture" x="202" y="82" width="10" height="90"/>
          <line x1="28" y1="172" x2="232" y2="172"/>
          <!-- Cota de alto -->
          <line x1="248" y1="70" x2="248" y2="172"/>
          <line x1="242" y1="70" x2="254" y2="70"/>
          <line x1="242" y1="172" x2="254" y2="172"/>
          <text x="265" y="121" text-anchor="middle" transform="rotate(90 265 121)">Alto · 72 cm</text>
          <!-- Fondo -->
          <text x="130" y="192" text-anchor="middle">Fondo · 80 cm</text>
        </svg>
        <dl>
          <dt>Largo</dt><dd>160 cm</dd>
          <dt>Fondo</dt><dd>80 cm</dd>
          <dt>Alto</dt><dd>72 cm</dd>
        </dl>
      </div>
      <div class="gallery">
        <figure>
          <a href="/img/mesa1/mesa1_1.JPEG" target="_blank" rel="noreferrer noopener">
            <img src="/img/mesa1/mesa1_1.JPEG" alt="Mesa 1 - foto 1">
          </a>
          <figcaption>Foto 1</figcaption>
        </figure>
        <figure>
          <a href="/img/mesa1/mesa1_2.JPEG" target="_blank" rel="noreferrer noopener">
            <img src="/img/mesa1/mesa1_2.JPEG" alt="Mesa 1 - foto 2">
          </a>
          <figcaption>Foto 2</figcaption>
        </figure>
        <figure>
          <a href="/img/mesa1/mesa1_3.JPEG" target="_blank" rel="noreferrer noopener">
            <img src="/img/mesa1/mesa1_3.JPEG" alt="Mesa 1 - foto 3">
          </a>
          <figcaption>Foto 3</figcaption>
        </figure>
        <figure>
          <a href="/img/mesa1/mesa1_4.JPEG" target="_blank" rel="noreferrer noopener">
            <img src="/img/mesa1/mesa1_4.JPEG" alt="Mesa 1 - foto 4">
          </a>

        </figure>
        <figure>
          <a href="/img/mesa1/mesa1_5.JPEG" target="_blank" rel="noreferrer noopener">
            <img src="/img/mesa1/mesa1_5.JPEG" alt="Mesa 1 - foto 5">
          </a>

        </figure>
      </div>
    </section>
