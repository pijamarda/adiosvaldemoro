        <h3>Mesa 1</h3>
      <div class="specs">
        <svg class="diagram" viewBox="0 0 330 250" role="img"
             aria-label="Mesa 1 en vista isométrica: 160 cm de largo, 80 cm de fondo y 72 cm de alto">
          <!-- Patas traseras (detrás del tablero) -->
          <line class="leg" x1="150" y1="60" x2="150" y2="140"/>
          <line class="leg" x1="95" y1="92" x2="95" y2="172"/>
          <line class="leg" x1="258" y1="122" x2="258" y2="202"/>
          <!-- Caras del tablero -->
          <polygon class="side" points="258,110 203,142 203,154 258,122"/>
          <polygon class="side" points="203,142 95,80 95,92 203,154"/>
          <polygon class="top" points="150,48 258,110 203,142 95,80"/>
          <!-- Pata delantera (delante del tablero) -->
          <line class="leg" x1="203" y1="154" x2="203" y2="234"/>
          <!-- Cota de largo -->
          <text x="214" y="62" text-anchor="middle" transform="rotate(30 214 62)">Largo · 160 cm</text>
          <!-- Cota de fondo -->
          <text x="112" y="47" text-anchor="middle" transform="rotate(-30 112 47)">Fondo · 80 cm</text>
          <!-- Cota de alto -->
          <line class="lead" x1="258" y1="110" x2="290" y2="110"/>
          <line class="lead" x1="258" y1="202" x2="290" y2="202"/>
          <line x1="290" y1="110" x2="290" y2="202"/>
          <line x1="285" y1="110" x2="295" y2="110"/>
          <line x1="285" y1="202" x2="295" y2="202"/>
          <text x="306" y="156" text-anchor="middle" transform="rotate(90 306 156)">Alto · 72 cm</text>
        </svg>
        <dl>
          <dt>Largo</dt><dd>160 cm</dd>
          <dt>Fondo</dt><dd>80 cm</dd>
          <dt>Alto</dt><dd>72 cm</dd>
        </dl>
